<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet_RDZ v2 — Gestion de Flotte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --red:#c0272d;--red-d:#a31f24;--red-l:#fdf2f2;--red-m:#f8dada;
  --bg:#f2f2f4;--white:#fff;
  --anth:#2d2d2d;--anth2:#3a3a3a;--anth3:#4a4a4a;
  --border:#e2e2e6;--border2:#d0d0d6;
  --text:#2d2d2d;--text2:#4b5563;--text3:#9ca3af;--text4:#c4c4cc;
  --green:#16a34a;--green-l:#f0fdf4;--green-m:#dcfce7;
  --orange:#ea580c;--orange-l:#fff7ed;
  --blue:#2563eb;--blue-l:#eff6ff;
  --yellow:#ca8a04;--yellow-l:#fefce8;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18);
  --radius:14px;--radius-sm:8px;--radius-xs:5px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
input,select,textarea{font-family:'DM Sans',sans-serif;}

/* TOPBAR */
.topbar{background:var(--anth2);color:white;height:56px;display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.3);border-bottom:3px solid var(--red);flex-shrink:0;position:sticky;top:0;z-index:100;}
.tb-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:white;padding:6px 12px;border-radius:var(--radius-xs);font-size:12px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .15s;flex-shrink:0;}
.tb-back:hover{background:rgba(255,255,255,.15);}
.tb-mark{width:32px;height:32px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tb-info{flex:1;}
.tb-brand{font-family:'DM Mono';font-size:13.5px;font-weight:600;color:white;line-height:1.1;}
.tb-sub{font-size:9.5px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;}
.tb-user{font-size:11.5px;color:rgba(255,255,255,.55);flex-shrink:0;}
.tb-logout{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:5px 11px;border-radius:var(--radius-xs);font-size:11px;transition:all .15s;}
.tb-logout:hover{background:rgba(255,255,255,.1);color:white;}

/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:#2d2d2d;z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
#login-screen.visible{display:flex}
.login-card{background:white;border-radius:16px;padding:36px 40px;width:380px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.login-logo img{width:48px;height:48px;border-radius:50%;object-fit:cover;}
.login-card h2{font-size:16px;font-weight:600;color:#2d2d2d;margin-bottom:4px;}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:20px;}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.login-field label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;}
.login-field input{background:#f7f7f9;border:1px solid #e2e2e6;border-radius:8px;padding:9px 12px;font-size:14px;color:#2d2d2d;width:100%;}
.login-field input:focus{outline:none;border-color:#c0272d;background:white;}
.login-btn{width:100%;padding:10px;background:#c0272d;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;font-family:'DM Sans',sans-serif;}
.login-btn:hover{background:#a31f24;}
.login-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b;margin-top:10px;display:none;}
.login-error.visible{display:block;}
.login-back{display:block;text-align:center;margin-top:16px;font-size:12.5px;color:#9ca3af;text-decoration:none;}
.login-back:hover{color:#2d2d2d;}
.btn-primary{width:100%;padding:11px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:background .15s;margin-top:4px;font-family:'DM Sans',sans-serif;}
.btn-primary:hover{background:var(--red-d);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{padding:8px 14px;background:white;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;}
.btn-secondary:hover{background:var(--bg);border-color:var(--anth3);}

/* APP */
#app{flex:1;display:none;flex-direction:column;}
#app.visible{display:flex;}

/* LAYOUT */
.app-body{display:flex;flex:1;min-height:0;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-search{padding:12px 12px 8px;}
.sidebar-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);padding:7px 10px;font-size:12.5px;color:var(--text);outline:none;}
.sidebar-search input:focus{border-color:var(--red);}
.sidebar-body{flex:1;overflow-y:auto;padding:4px 0 8px;}
.sidebar-add-wrap{padding:10px 12px;border-top:1px solid var(--border);}
.cat-group{margin-bottom:4px;}
.cat-label{padding:10px 12px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px;}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.veh-item{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;transition:background .1s;border-radius:0;}
.veh-item:hover{background:var(--bg);}
.veh-item.active{background:var(--red-l);border-right:3px solid var(--red);}
.veh-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.veh-plate{font-family:'DM Mono';font-size:11.5px;font-weight:600;color:var(--text);}
.veh-name{font-size:11px;color:var(--text3);}
.veh-alert{width:7px;height:7px;border-radius:50%;background:#ef4444;margin-left:auto;}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg);}
#main-content{padding:24px;max-width:1100px;}

/* TOASTS */
#toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999;}
.toast{background:var(--anth);color:white;padding:10px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);animation:tin .2s ease;max-width:320px;}
.toast.err{background:#991b1b;}
.toast.warn{background:#92400e;}
.toast.out{animation:tout .2s ease forwards;}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(10px)}}

/* DASHBOARD */
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.dash-title{font-size:20px;font-weight:700;color:var(--anth);margin-bottom:2px;}
.dash-sub{font-size:13px;color:var(--text3);}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi{background:white;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.kpi-val{font-size:22px;font-weight:700;color:var(--anth);margin-bottom:2px;font-family:'DM Mono';}
.kpi-lbl{font-size:11.5px;color:var(--text3);font-weight:500;}
.kpi-sub{font-size:10.5px;color:var(--text4);margin-top:2px;}
.kpi.red .kpi-val{color:var(--red);}
.kpi.green .kpi-val{color:var(--green);}

/* COSTS SECTION */
.costs-section{background:white;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.cs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cs-title{font-size:14px;font-weight:700;color:var(--anth);}
.cs-total{font-family:'DM Mono';font-size:18px;font-weight:700;color:var(--red);}
.cost-rows{display:flex;flex-direction:column;gap:8px;}
.cost-row{display:flex;align-items:center;gap:10px;}
.cost-label{font-size:12.5px;color:var(--text2);flex:1;}
.cost-bar-wrap{flex:2;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.cost-bar{height:100%;border-radius:3px;background:var(--red);transition:width .4s;}
.cost-amt{font-family:'DM Mono';font-size:12px;font-weight:600;color:var(--anth);min-width:90px;text-align:right;}

/* ALERTS */
.alerts-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.alert-item{display:flex;align-items:flex-start;gap:10px;background:white;border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow);border-left:4px solid;}
.alert-item.err{border-color:var(--red);background:var(--red-l);}
.alert-item.warn{border-color:var(--orange);background:var(--orange-l);}
.alert-icon{font-size:16px;flex-shrink:0;line-height:1;}
.alert-text{font-size:13px;font-weight:600;color:var(--anth);}
.alert-desc{font-size:11.5px;color:var(--text2);margin-top:1px;}

/* VEHICLE GRID */
.veh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.veh-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s,transform .1s;border:2px solid transparent;}
.veh-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.vc-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.vc-cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.vc-plate{font-family:'DM Mono';font-size:15px;font-weight:700;color:var(--anth);}
.vc-model{font-size:12px;color:var(--text3);}
.vc-km{font-family:'DM Mono';font-size:13px;font-weight:600;color:var(--text2);}
.vc-leasing{margin-top:8px;}
.vc-lease-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px;}
.vc-lease-fill{height:100%;border-radius:3px;transition:width .4s;}
.vc-lease-lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
.vc-alerts{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.vc-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.vc-badge.err{background:var(--red-m);color:var(--red-d);}
.vc-badge.warn{background:#fde68a;color:#92400e;}

/* VEHICLE DETAIL */
.detail-topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.btn-back-dash{background:white;border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s;}
.btn-back-dash:hover{background:var(--bg);border-color:var(--anth3);}
.detail-title{font-size:18px;font-weight:700;color:var(--anth);flex:1;}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.dtab{padding:9px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;}
.dtab:hover{color:var(--anth);}
.dtab.active{color:var(--red);border-bottom-color:var(--red);font-weight:600;}

/* TABS CONTENT */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:14px;}
.info-card{background:white;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.ic-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ic-row{display:flex;flex-direction:column;gap:2px;margin-bottom:10px;}
.ic-row:last-child{margin-bottom:0;}
.ic-key{font-size:10.5px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.ic-val{font-size:13px;color:var(--text);font-weight:500;}
.ic-val.mono{font-family:'DM Mono';}
.ic-val.err{color:var(--red);}
.ic-val.warn{color:var(--orange);}

/* KM TAB */
.km-tab-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.km-tab-layout{grid-template-columns:1fr;}}
.km-input-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.km-chart-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.km-table-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);grid-column:1/-1;}
.km-input-row{display:flex;gap:8px;margin-top:10px;}
.km-input-row input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;font-family:'DM Mono';}
.km-input-row input:focus{outline:none;border-color:var(--red);background:white;}
.km-save-btn{padding:8px 16px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;}
.km-save-btn:hover{background:var(--red-d);}
.km-progress{margin-top:12px;}
.km-prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px;}
.km-prog-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.km-prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width .5s;}
.km-prog-fill.warn{background:var(--orange);}
.km-prog-fill.err{background:var(--red);}

/* KM TABLE */
.km-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.km-table th{padding:6px 10px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);}
.km-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.km-table tr:last-child td{border-bottom:none;}
.km-table td.mono{font-family:'DM Mono';font-weight:600;}

/* JOURNAL */
.journal-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.journal-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.filter-btn{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .12s;}
.filter-btn:hover{background:white;border-color:var(--anth3);}
.filter-btn.active{background:var(--anth);color:white;border-color:var(--anth);}
.journal-list{display:flex;flex-direction:column;gap:0;}
.j-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.j-entry:last-child{border-bottom:none;}
.j-line{width:2px;background:var(--border);flex-shrink:0;display:none;}
.j-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.j-body{flex:1;min-width:0;}
.j-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.j-event{font-size:13px;font-weight:600;color:var(--anth);}
.j-date{font-size:11.5px;color:var(--text3);font-family:'DM Mono';flex-shrink:0;}
.j-desc{font-size:12.5px;color:var(--text2);margin-top:3px;line-height:1.5;}
.j-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.j-tag{font-size:11px;background:var(--bg);border-radius:4px;padding:2px 6px;color:var(--text3);}
.j-amount{font-size:11.5px;font-family:'DM Mono';font-weight:600;color:var(--green);}
.j-empty{padding:20px;text-align:center;color:var(--text3);font-size:13px;}

/* CONDUCTEUR TAB */
.driver-card{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.driver-current{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:14px;}
.driver-avatar{width:40px;height:40px;border-radius:50%;background:var(--anth);color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.driver-name{font-size:14px;font-weight:600;color:var(--anth);}
.driver-since{font-size:11.5px;color:var(--text3);}
.history-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.history-table th{padding:6px 10px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);}
.history-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
.history-table tr:last-child td{border-bottom:none;}

/* PNEU SLOTS */
.pneu-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pneu-slot{background:var(--bg);border-radius:var(--radius-sm);padding:10px;}
.ps-head{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.ps-icon{font-size:14px;}
.ps-type{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.ps-status{font-size:12px;color:var(--text);}

/* GLOBAL LOG */
.glog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.glog-title{font-size:18px;font-weight:700;color:var(--anth);}
.glog-filters{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.glog-filter-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.glog-filter-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:12.5px;color:var(--text);}
.glog-filter-select:focus{outline:none;border-color:var(--red);}
.glog-reset-btn{align-self:end;padding:7px 14px;background:white;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.glog-reset-btn:hover{background:var(--bg);}
.glog-list{display:flex;flex-direction:column;gap:8px;}
.glog-entry{background:white;border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start;}
.glog-veh-badge{font-family:'DM Mono';font-size:10.5px;font-weight:700;background:var(--red-l);color:var(--red-d);padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.glog-body{flex:1;min-width:0;}
.glog-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.glog-event{font-size:13px;font-weight:600;color:var(--anth);}
.glog-date{font-size:11.5px;color:var(--text3);font-family:'DM Mono';}
.glog-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.glog-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.glog-empty{padding:30px;text-align:center;color:var(--text3);font-size:13px;background:white;border-radius:var(--radius);box-shadow:var(--shadow);}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:var(--radius);padding:28px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);}
.modal-title{font-size:16px;font-weight:700;color:var(--anth);margin-bottom:18px;}
.form-row{display:flex;gap:10px;margin-bottom:12px;}
.form-col{flex:1;display:flex;flex-direction:column;gap:4px;}
.form-col label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}

<!-- MODAL VÉHICULE -->
<div class="modal-bg" id="modal-vehicle">
  <div class="modal">
    <div class="modal-title" id="modal-veh-title">Ajouter un véhicule</div>
    <div class="form-row">
      <div class="form-col">
        <label>Immatriculation *</label>
        <input type="text" id="vf-plate" placeholder="GE 000 000">
      </div>
      <div class="form-col">
        <label>Catégorie</label>
        <select id="vf-cat">
          <option value="operational">Opérationnel</option>
          <option value="direction">Direction</option>
          <option value="service">Service</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Marque *</label><input type="text" id="vf-brand"></div>
      <div class="form-col"><label>Modèle *</label><input type="text" id="vf-model"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>VIN</label><input type="text" id="vf-vin" placeholder="N° de châssis"></div>
      <div class="form-col"><label>Kilométrage actuel</label><input type="number" id="vf-km" placeholder="km"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Fin leasing</label><input type="date" id="vf-leasing-end"></div>
      <div class="form-col"><label>Km max leasing</label><input type="number" id="vf-leasing-km"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Assurance</label><input type="text" id="vf-insurance" placeholder="Compagnie — contact"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Garage</label><input type="text" id="vf-garage" placeholder="Garage — adresse — tél"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>N° contrat</label><input type="text" id="vf-contract"></div>
      <div class="form-col"><label>Taille pneus</label><input type="text" id="vf-tires" placeholder="195/55R/16"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Pneus été</label><input type="text" id="vf-tires-summer"></div>
      <div class="form-col"><label>Pneus hiver</label><input type="text" id="vf-tires-winter"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Travaux en attente</label><textarea id="vf-todo" placeholder="Une ligne par travail…"></textarea></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Notes</label><textarea id="vf-notes" placeholder="Infos complémentaires…"></textarea></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-vehicle')">Annuler</button>
      <button class="modal-save" onclick="saveVehicle()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-bg" id="modal-event">
  <div class="modal">
    <div class="modal-title">Ajouter un événement</div>
    <div class="form-row">
      <div class="form-col">
        <label>Date *</label>
        <input type="date" id="ef-date">
      </div>
      <div class="form-col">
        <label>Type *</label>
        <select id="ef-type">
          <option value="revision">Révision</option>
          <option value="pneu">Pneu</option>
          <option value="reparation">Réparation</option>
          <option value="assurance">Assurance</option>
          <option value="km">Kilométrage</option>
          <option value="degradation">Dégradation</option>
          <option value="anomalie">Anomalie</option>
          <option value="rdv">RDV</option>
          <option value="message">Message</option>
          <option value="conducteur">Conducteur</option>
          <option value="flocage">Flocage / Sérigraphie</option>
          <option value="depot">Dépôt</option>
          <option value="reprise">Reprise</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Description *</label><textarea id="ef-desc" placeholder="Décrivez l'événement…"></textarea></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Km au compteur</label><input type="number" id="ef-km" placeholder="optionnel"></div>
      <div class="form-col"><label>Montant (CHF)</label><input type="number" id="ef-amount" placeholder="optionnel" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Prestataire</label><input type="text" id="ef-provider" placeholder="Garage, compagnie…"></div>
      <div class="form-col"><label>N° facture</label><input type="text" id="ef-invoice" placeholder="Référence"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-event')">Annuler</button>
      <button class="modal-save" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL CONDUCTEUR -->
<div class="modal-bg" id="modal-driver">

    <div class="form-row">
      <div class="form-col"><label>Date de prise en charge</label><input type="date" id="df-date"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Motif</label><input type="text" id="df-reason" placeholder="Affectation, rotation, …"></div>

    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-driver')">Annuler</button>
      <button class="modal-save" onclick="saveDriverChange()">Enregistrer</button>
    </div>
  </div>
</div>

// ─── UTILS ───
function todayISO() {
  return new Date().toISOString().slice(0,10);
}
function formatDate(d) {
  if (!d) return '—';
  const [y,m,dy] = d.split('-');
  return `${dy}.${m}.${y}`;
}
function uuid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

// ─── SUPABASE ───
async function sbFetch(path, opts = {}) {
  const token = session?.access_token;
  const headers = {
    'apikey': SB_KEY,
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
    ...opts.headers,
  };
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ─── AUTH ───
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(AUTH_KEY);
  if (saved) {
    try {
      session = JSON.parse(saved);
      if (session.expires_at && Date.now() / 1000 < session.expires_at) {
        startApp(); return;
      }
    } catch(e) {}
  }
  showLogin();
});

function showLogin() {
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('app').classList.remove('visible');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  err.classList.remove('visible');
  if (!email || !pass) { showErr('Veuillez remplir tous les champs.'); return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body: JSON.stringify({email, password: pass})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Identifiants invalides');
    const prof = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${data.user.id}&select=*`, {
      headers:{'apikey':SB_KEY,'Authorization':`Bearer ${data.access_token}`}
    });
    const profiles = await prof.json();
    const profile = profiles[0] || {role:'agent'};
    session = { ...data, profile, expires_at: Math.floor(Date.now()/1000) + data.expires_in };
    localStorage.setItem(AUTH_KEY, JSON.stringify(session));
    startApp();
  } catch(e) {
    showErr(e.message);
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
  function showErr(msg){ err.textContent = msg; err.classList.add('visible'); }
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function logout() {
  localStorage.removeItem(AUTH_KEY);
  session = null;
  showLogin();
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

function startApp() {
  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('app').classList.add('visible');
  document.getElementById('tb-user').textContent = session?.profile?.full_name || session?.user?.email || '';
  loadData();
}

function isAdmin() { return session?.profile?.role === 'admin'; }

// ─── DATA ───
async function loadData() {
  document.getElementById('main-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px;">⏳ Chargement de la flotte…</div>';
  try {
    const [vData, eData] = await Promise.all([
      sbFetch('fleet_vehicles?select=*&active=eq.true&order=plate.asc'),
      sbFetch('fleet_events?select=*&order=date.desc'),
    ]);
    vehicles = vData || [];
    events   = eData || [];
    if (vehicles.length === 0) await seedDefaults();
    if (!canEdit()) vehicles = vehicles.filter(v => v.category === 'operational');
    cacheLocally();
    renderSidebar();
    renderDashboard();
    if (canEdit()) document.getElementById('sidebar-add-wrap').style.display = 'block';
  } catch(e) {
    console.warn('Supabase unavailable, using local cache:', e.message);
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try {
        const stored = JSON.parse(raw);
        vehicles = stored.vehicles || DEFAULT_VEHICLES;
        events   = stored.events   || DEFAULT_EVENTS;
      } catch(_) { vehicles = [...DEFAULT_VEHICLES]; events = [...DEFAULT_EVENTS]; }
    } else { vehicles = [...DEFAULT_VEHICLES]; events = [...DEFAULT_EVENTS]; }
    if (!canEdit()) vehicles = vehicles.filter(v => v.category === 'operational');
    renderSidebar();
    renderDashboard();
    if (canEdit()) document.getElementById('sidebar-add-wrap').style.display = 'block';
    toast('Mode hors-ligne — données locales', 'warn');
  }
}

async function seedDefaults() {
  for (const v of DEFAULT_VEHICLES) {
    try { await sbFetch('fleet_vehicles', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(v) }); }
    catch(e) { console.warn('seed vehicle:', e.message); }
  }
  try { await sbFetch('fleet_events', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(DEFAULT_EVENTS) }); }
  catch(e) { console.warn('seed events:', e.message); }
  const [vData, eData] = await Promise.all([
    sbFetch('fleet_vehicles?select=*&active=eq.true&order=plate.asc'),
    sbFetch('fleet_events?select=*&order=date.desc'),
  ]);
  vehicles = vData || DEFAULT_VEHICLES;
  events   = eData || DEFAULT_EVENTS;
}

function cacheLocally() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ vehicles, events }));
}

// ─── SIDEBAR ───
function filterVehicles() { renderSidebar(document.getElementById('veh-search').value.toLowerCase()); }

function renderSidebar(query='') {
  const container = document.getElementById('sidebar-body');
  const cats = {};
  for (const v of vehicles) {
    if (!v.active) continue;
    if (query && !`${v.plate} ${v.brand} ${v.model}`.toLowerCase().includes(query)) continue;
    if (!cats[v.category]) cats[v.category] = [];
    cats[v.category].push(v);
  }
  let html = '';
  for (const [cat, cfg] of Object.entries(CAT_CONFIG)) {
    if (!cats[cat]?.length) continue;
    html += `<div class="cat-group">
      <div class="cat-label"><span class="cat-dot" style="background:${cfg.color};"></span>${cfg.label}</div>`;
    for (const v of cats[cat]) {
      const hasAlert = getVehicleAlerts(v).length > 0;
      html += `<div class="veh-item ${selectedVehicleId===v.id?'active':''}" onclick="selectVehicle('${v.id}')">
        <div class="veh-icon" style="background:${cfg.color}18;">${cfg.icon}</div>
        <div><div class="veh-plate">${v.plate}</div><div class="veh-name">${v.brand} ${v.model}</div></div>
        ${hasAlert ? '<div class="veh-alert"></div>' : ''}
      </div>`;
    }
    html += '</div>';
  }
  if (!html) html = '<div style="padding:16px;font-size:12.5px;color:var(--text3);text-align:center;">Aucun véhicule</div>';
  container.innerHTML = html;
}

function selectVehicle(id) {
  selectedVehicleId = id;
  const v = vehicles.find(x => x.id === id);
  if (v) { activeTab = 'infos'; renderVehicleDetail(v); renderSidebar(document.getElementById('veh-search').value.toLowerCase()); }
}

// ─── ALERTS ───
function getVehicleAlerts(v) {
  const alerts = [];
  const today = new Date();
  if (v.leasing_end) {
    const end = new Date(v.leasing_end);
    const diff = (end - today) / (1000*60*60*24);
    if (diff < 0) alerts.push({type:'err', icon:'📋', text:'Leasing expiré', desc:`${v.plate} — ${formatDate(v.leasing_end)}`});
    else if (diff < 90) alerts.push({type:'warn', icon:'📋', text:'Fin de leasing proche', desc:`${v.plate} — ${formatDate(v.leasing_end)} (${Math.round(diff)} j.)`});
  }
  if (v.todo && v.todo.trim()) alerts.push({type:'warn', icon:'🔧', text:'Travaux en attente', desc:`${v.plate} — ${v.todo.split('\n')[0]}`});
  return alerts;
}
function getAllAlerts() { return vehicles.filter(v=>v.active).flatMap(v => getVehicleAlerts(v)); }

  const usedPct = (v.km_current && v.leasing_km_max) ? Math.min(v.km_current / v.leasing_km_max * 100, 100) : null;
  const barColor = usedPct ? (usedPct>90?'err':usedPct>75?'warn':'') : '';

  html += `<div class="tab-panel ${activeTab==='km'?'active':''}" id="tab-km">
    <div class="km-tab-layout">
      <div class="km-input-card">
        <div class="ic-title"><span>📍</span> Relevé kilométrique</div>
        <div style="font-size:24px;font-family:'DM Mono';font-weight:700;color:var(--anth);margin:8px 0;">
          ${v.km_current ? v.km_current.toLocaleString('fr-CH') + ' km' : '— km'}
        </div>
        ${usedPct !== null ? `
        <div class="km-progress">
          <div class="km-prog-lbl">
            <span>Utilisation leasing</span>
            <span>${usedPct.toFixed(1)}% — ${v.leasing_km_max.toLocaleString('fr-CH')} km max</span>
          </div>
          <div class="km-prog-bar"><div class="km-prog-fill ${barColor}" style="width:${usedPct}%;"></div></div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px;">Fin : ${formatDate(v.leasing_end)}</div>
        </div>` : ''}
        ${canEdit() ? `
        <div style="margin-top:14px;">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;">Nouveau relevé</div>
          <div class="km-input-row">
            <input type="number" id="km-new-${v.id}" placeholder="Kilométrage actuel" min="0">
            <button class="km-save-btn" onclick="saveKm('${v.id}')">Enregistrer</button>
          </div>
        </div>` : ''}
      </div>
      <div class="km-chart-card">
        <div class="ic-title"><span>📈</span> Évolution kilométrique</div>
        ${kmEvents.length < 2 ? `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12.5px;">Pas assez de données pour tracer la courbe.<br>Enregistrez au moins 2 relevés.</div>`
        : `<canvas id="km-chart-${v.id}" height="200"></canvas>`}
      </div>
      <div class="km-table-card">
        <div class="ic-title"><span>📋</span> Historique des relevés</div>
        ${kmEvents.length === 0 ? `<div class="j-empty">Aucun relevé enregistré.</div>` : `
        <table class="km-table">
          <thead><tr><th>Date</th><th>Km compteur</th><th>Description</th><th>Saisi par</th></tr></thead>
          <tbody>
            ${[...kmEvents].reverse().map(e => `<tr>
              <td>${formatDate(e.date)}</td>
              <td class="mono">${e.km.toLocaleString('fr-CH')} km</td>
              <td>${e.description||'—'}</td>
              <td style="color:var(--text3);">${e.created_by||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  </div>`;

  // ── TAB: JOURNAL ──
  const filteredEvents = journalFilter === 'all' ? vEvents : vEvents.filter(e => e.type === journalFilter);
  html += `<div class="tab-panel ${activeTab==='journal'?'active':''}" id="tab-journal">
    <div class="journal-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="ic-title" style="margin-bottom:0;"><span>📝</span> Journal — ${vEvents.length} entrée${vEvents.length>1?'s':''}</div>
        ${canEdit() ? `<button class="btn-secondary" style="font-size:12px;" onclick="openAddEvent('${v.id}')">+ Ajouter</button>` : ''}
      </div>
      <div class="journal-filters">
        ${['all','revision','pneu','reparation','assurance','km','degradation','anomalie','rdv','message','conducteur','flocage'].map(f =>
          `<button class="filter-btn ${journalFilter===f?'active':''}" onclick="setJournalFilter('${v.id}','${f}')">${EVENT_LABELS[f]||f}</button>`
        ).join('')}
      </div>
      <div class="journal-list">`;

  if (filteredEvents.length === 0) {
    html += `<div class="j-empty">Aucun événement${journalFilter!=='all'?' pour ce filtre':''}.</div>`;
  } else {
    for (const ev of filteredEvents) {
      const cfg2 = EVENT_CONFIG[ev.type] || {icon:'📌',bg:'#f9fafb'};
      html += `<div class="j-entry">
        <div class="j-dot" style="background:${cfg2.bg};">${cfg2.icon}</div>
        <div class="j-body">
          <div class="j-top">
            <div class="j-event">${EVENT_LABELS[ev.type]||ev.type}</div>
            <div class="j-date">${formatDate(ev.date)}</div>
          </div>
          ${ev.description ? `<div class="j-desc">${ev.description}</div>` : ''}
          <div class="j-meta">
            ${ev.km ? `<span class="j-tag">📍 ${ev.km.toLocaleString('fr-CH')} km</span>` : ''}
            ${ev.provider ? `<span class="j-tag">🏢 ${ev.provider}</span>` : ''}
            ${ev.invoice ? `<span class="j-tag">🧾 ${ev.invoice}</span>` : ''}
            ${ev.amount ? `<span class="j-amount">CHF ${ev.amount.toFixed(2)}</span>` : ''}
          </div>
        </div>
      </div>`;
    }
  }
  html += `</div></div></div>`;

  // ── TAB: CONDUCTEUR ──
  const driverEvents = vEvents.filter(e => e.type === 'conducteur').sort((a,b) => b.date.localeCompare(a.date));
  const currentDriver = driverEvents[0];
  html += `<div class="tab-panel ${activeTab==='conducteur'?'active':''}" id="tab-conducteur">
    <div class="driver-card">
      <div class="ic-title"><span>👤</span> Conducteur principal</div>
      ${currentDriver ? `
      <div class="driver-current">
        <div class="driver-avatar">${currentDriver.description?.charAt(0)||'?'}</div>
        <div>
          <div class="driver-name">${currentDriver.description||'Inconnu'}</div>
          <div class="driver-since">Depuis le ${formatDate(currentDriver.date)}</div>
        </div>
      </div>` : `<div style="padding:12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:14px;font-size:12.5px;color:var(--text3);">Aucun conducteur renseigné.</div>`}
      ${canEdit() ? `<button class="btn-secondary" onclick="openDriverModal('${v.id}')">👤 Changer de conducteur</button>` : ''}
    </div>
    ${driverEvents.length > 1 ? `
    <div class="driver-card">
      <div class="ic-title"><span>📅</span> Historique des conducteurs</div>
      <table class="history-table">
        <thead><tr><th>Date</th><th>Conducteur</th><th>Motif</th><th>Saisi par</th></tr></thead>
        <tbody>
          ${driverEvents.map(e => `<tr>
            <td>${formatDate(e.date)}</td>
            <td style="font-weight:500;color:var(--anth);">${e.description||'—'}</td>
            <td>${e.provider||'—'}</td>
            <td style="color:var(--text3);">${e.created_by||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  </div>`;

  document.getElementById('main-content').innerHTML = html;

  // Draw km chart if needed
  if (activeTab === 'km' && kmEvents.length >= 2) {
    setTimeout(() => drawKmChart(v.id, kmEvents), 50);
  }
}

function switchTab(tab, vehicleId) {
  activeTab = tab;
  journalFilter = 'all';
  const v = vehicles.find(x => x.id === vehicleId);
  if (v) renderVehicleDetail(v);
}

function setJournalFilter(vehicleId, f) {
  journalFilter = f;
  const v = vehicles.find(x => x.id === vehicleId);
  if (v) renderVehicleDetail(v);
}

// ─── KM CHART ───
function drawKmChart(vehicleId, kmEvents) {
  const canvas = document.getElementById(`km-chart-${vehicleId}`);
  if (!canvas) return;
  if (activeKmChart) { activeKmChart.destroy(); activeKmChart = null; }
  const labels = kmEvents.map(e => formatDate(e.date));
  const data   = kmEvents.map(e => e.km);
  activeKmChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Kilométrage',
        data,
        borderColor: '#c0272d',
        backgroundColor: 'rgba(192,39,45,.08)',
        borderWidth: 2,
        pointRadius: 4,
        pointBackgroundColor: '#c0272d',
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y.toLocaleString('fr-CH')} km`
          }
        }
      },
      scales: {
        y: {
          ticks: { callback: v => v.toLocaleString('fr-CH') + ' km', font: {family:'DM Mono', size:10} },
          grid: { color: '#e2e2e6' }
        },
        x: { ticks: { font: {size:10} }, grid: { display:false } }
      }
    }
  });
}

// ─── SAVE KM (BUG FIXED: UUID) ───
async function saveKm(vehicleId) {
  const input = document.getElementById(`km-new-${vehicleId}`);
  const val = parseInt(input.value);
  if (!val || val < 0) { toast('Kilométrage invalide','err'); return; }
  const v = vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  const ev = {
    id: uuid(),  // FIX: was 'ev-' + Date.now() causing 400
    vehicle_id: vehicleId,
    date: todayISO(),
    type: 'km',
    km: val,
    description: `Relevé kilométrage — compteur : ${val.toLocaleString('fr-CH')} km`,
    provider: '', invoice: '', amount: null,
    created_by: session?.profile?.full_name || 'admin'
  };
  try {
    await sbFetch('fleet_events', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(ev) });
    await sbFetch(`fleet_vehicles?id=eq.${vehicleId}`, { method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({km_current:val}) });
    events.push(ev);
    v.km_current = val;
    cacheLocally();
    toast('Relevé enregistré ✓');
    renderVehicleDetail(v);
    renderSidebar();
  } catch(e) { toast('Erreur: ' + e.message, 'err'); }
}

// ─── GLOBAL LOG ───
function showGlobalLog() {
  selectedVehicleId = null;
  renderSidebar('');
  glogFilters = { vehicle:'', type:'', dateFrom:'', dateTo:'', provider:'' };
  renderGlobalLog();
}

function renderGlobalLog() {
  const allSorted = [...events].sort((a,b) => b.date.localeCompare(a.date));

  // Apply filters
  let filtered = allSorted;
  if (glogFilters.vehicle) filtered = filtered.filter(e => e.vehicle_id === glogFilters.vehicle);
  if (glogFilters.type) filtered = filtered.filter(e => e.type === glogFilters.type);
  if (glogFilters.dateFrom) filtered = filtered.filter(e => e.date >= glogFilters.dateFrom);
  if (glogFilters.dateTo) filtered = filtered.filter(e => e.date <= glogFilters.dateTo);
  if (glogFilters.provider) filtered = filtered.filter(e => e.provider?.toLowerCase().includes(glogFilters.provider.toLowerCase()));

  const totalAmount = filtered.reduce((s,e) => s+(e.amount||0), 0);

  let html = `
    <div class="glog-header">
      <div>
        <div class="glog-title">📋 Main courante globale</div>
        <div style="font-size:12.5px;color:var(--text3);">${filtered.length} événement${filtered.length>1?'s':''} · ${totalAmount>0?totalAmount.toFixed(2)+' CHF':''}</div>
      </div>
      <button class="btn-secondary" onclick="renderDashboard()">← Tableau de bord</button>
    </div>

    <div class="glog-filters">
      <div>
        <div class="glog-filter-label">Véhicule</div>
        <select class="glog-filter-select" onchange="glogSetFilter('vehicle',this.value)">
          <option value="">Tous</option>
          ${vehicles.map(v => `<option value="${v.id}" ${glogFilters.vehicle===v.id?'selected':''}>${v.plate} — ${v.brand} ${v.model}</option>`).join('')}
        </select>
      </div>
      <div>
        <div class="glog-filter-label">Type d'événement</div>
        <select class="glog-filter-select" onchange="glogSetFilter('type',this.value)">
          <option value="">Tous</option>
          ${Object.entries(EVENT_LABELS).filter(([k])=>k!=='all').map(([k,v]) =>
            `<option value="${k}" ${glogFilters.type===k?'selected':''}>${v}</option>`
          ).join('')}
        </select>
      </div>
      <div>
        <div class="glog-filter-label">Du</div>
        <input type="date" class="glog-filter-select" value="${glogFilters.dateFrom}" onchange="glogSetFilter('dateFrom',this.value)">
      </div>
      <div>
        <div class="glog-filter-label">Au</div>
        <input type="date" class="glog-filter-select" value="${glogFilters.dateTo}" onchange="glogSetFilter('dateTo',this.value)">
      </div>
      <div>
        <div class="glog-filter-label">Prestataire</div>
        <input type="text" class="glog-filter-select" placeholder="Rechercher…" value="${glogFilters.provider}" oninput="glogSetFilter('provider',this.value)">
      </div>
      <button class="glog-reset-btn" onclick="glogReset()">Réinitialiser</button>
    </div>

    <div class="glog-list">`;

  if (filtered.length === 0) {
    html += `<div class="glog-empty">Aucun événement pour ces filtres.</div>`;
  } else {
    for (const ev of filtered) {
      const veh = vehicles.find(v => v.id === ev.vehicle_id);
      const cfg2 = EVENT_CONFIG[ev.type] || {icon:'📌'};
      html += `<div class="glog-entry">
        <div>
          <div style="font-size:20px;margin-bottom:4px;">${cfg2.icon}</div>
          <div class="glog-veh-badge">${veh ? veh.plate : '?'}</div>
        </div>
        <div class="glog-body">
          <div class="glog-top">
            <div class="glog-event">${EVENT_LABELS[ev.type]||ev.type}</div>
            <div class="glog-date">${formatDate(ev.date)}</div>
          </div>
          ${ev.description ? `<div class="glog-desc">${ev.description}</div>` : ''}
          <div class="glog-meta">
            ${ev.km ? `<span class="j-tag">📍 ${ev.km.toLocaleString('fr-CH')} km</span>` : ''}
            ${ev.provider ? `<span class="j-tag">🏢 ${ev.provider}</span>` : ''}
            ${ev.invoice ? `<span class="j-tag">🧾 ${ev.invoice}</span>` : ''}
            ${ev.amount ? `<span class="j-amount">CHF ${ev.amount.toFixed(2)}</span>` : ''}
          </div>
        </div>
      </div>`;
    }
  }
  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

function glogSetFilter(key, val) {
  glogFilters[key] = val;
  renderGlobalLog();
}
function glogReset() {
  glogFilters = { vehicle:'', type:'', dateFrom:'', dateTo:'', provider:'' };
  renderGlobalLog();
}

// ─── VEHICLE CRUD ───
function openAddVehicle() {
  editingVehicleId = null;
  document.getElementById('modal-veh-title').textContent = 'Ajouter un véhicule';
  ['vf-plate','vf-brand','vf-model','vf-vin','vf-km','vf-leasing-end','vf-leasing-km',
   'vf-insurance','vf-garage','vf-contract','vf-tires','vf-tires-summer','vf-tires-winter','vf-todo','vf-notes']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  document.getElementById('vf-cat').value = 'operational';
  openModal('modal-vehicle');
}

function openEditVehicle(id) {
  const v = vehicles.find(x => x.id === id);
  if (!v) return;
  editingVehicleId = id;
  document.getElementById('modal-veh-title').textContent = `Modifier — ${v.plate}`;
  document.getElementById('vf-plate').value       = v.plate||'';
  document.getElementById('vf-cat').value         = v.category||'operational';
  document.getElementById('vf-brand').value       = v.brand||'';
  document.getElementById('vf-model').value       = v.model||'';
  document.getElementById('vf-vin').value         = v.vin||'';
  document.getElementById('vf-km').value          = v.km_current||'';
  document.getElementById('vf-leasing-end').value = v.leasing_end||'';
  document.getElementById('vf-leasing-km').value  = v.leasing_km_max||'';
  document.getElementById('vf-insurance').value   = v.insurance||'';
  document.getElementById('vf-garage').value      = v.garage||'';
  document.getElementById('vf-contract').value    = v.contract_num||'';
  document.getElementById('vf-tires').value       = v.tires_size||'';
  document.getElementById('vf-tires-summer').value= v.tires_summer||'';
  document.getElementById('vf-tires-winter').value= v.tires_winter||'';
  document.getElementById('vf-todo').value        = v.todo||'';
  document.getElementById('vf-notes').value       = v.notes||'';
  openModal('modal-vehicle');
}

async function saveVehicle() {
  const plate = document.getElementById('vf-plate').value.trim();
  const brand = document.getElementById('vf-brand').value.trim();
  const model = document.getElementById('vf-model').value.trim();
  if (!plate||!brand||!model) { toast('Champs obligatoires manquants','err'); return; }
  const data = {
    plate, brand, model,
    category:       document.getElementById('vf-cat').value,
    vin:            document.getElementById('vf-vin').value.trim(),
    km_current:     parseInt(document.getElementById('vf-km').value)||null,
    leasing_end:    document.getElementById('vf-leasing-end').value||null,
    leasing_km_max: parseInt(document.getElementById('vf-leasing-km').value)||null,
    insurance:      document.getElementById('vf-insurance').value.trim(),
    garage:         document.getElementById('vf-garage').value.trim(),
    contract_num:   document.getElementById('vf-contract').value.trim(),
    tires_size:     document.getElementById('vf-tires').value.trim(),
    tires_summer:   document.getElementById('vf-tires-summer').value.trim(),
    tires_winter:   document.getElementById('vf-tires-winter').value.trim(),
    todo:           document.getElementById('vf-todo').value.trim(),
    notes:          document.getElementById('vf-notes').value.trim(),
    active: true,
  };
  if (editingVehicleId) {
    try {
      await sbFetch(`fleet_vehicles?id=eq.${editingVehicleId}`, { method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(data) });
      const idx = vehicles.findIndex(x => x.id===editingVehicleId);
      if (idx>=0) vehicles[idx] = {...vehicles[idx], ...data};
      cacheLocally();
      toast(`${plate} modifié ✓`);
    } catch(e) { toast('Erreur: '+e.message,'err'); return; }
  } else {
    data.id = uuid();
    data.created_at = todayISO();
    try {
      await sbFetch('fleet_vehicles', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(data) });
      vehicles.push(data);
      cacheLocally();
      toast(`${plate} ajouté ✓`);
    } catch(e) { toast('Erreur: '+e.message,'err'); return; }
  }
  closeModal('modal-vehicle');
  renderSidebar();
  if (editingVehicleId) { const v=vehicles.find(x=>x.id===editingVehicleId); if(v) renderVehicleDetail(v); }
  else renderDashboard();
}

// ─── EVENT CRUD ───
function openAddEvent(vehicleId) {
  document.getElementById('ef-date').value = todayISO();
  document.getElementById('ef-type').value = 'revision';
  document.getElementById('ef-km').value = '';
  document.getElementById('ef-provider').value = '';
  document.getElementById('ef-invoice').value = '';
  document.getElementById('ef-amount').value = '';
  document.getElementById('ef-desc').value = '';
  document.getElementById('modal-event').dataset.vehicleId = vehicleId;
  openModal('modal-event');
}

async function saveEvent() {
  const vehicleId = document.getElementById('modal-event').dataset.vehicleId;
  const date = document.getElementById('ef-date').value;
  const type = document.getElementById('ef-type').value;
  const desc = document.getElementById('ef-desc').value.trim();
  if (!date||!desc) { toast('Date et description obligatoires','err'); return; }
  const ev = {
    id: uuid(),
    vehicle_id: vehicleId,
    date, type,
    km: parseInt(document.getElementById('ef-km').value)||null,
    description: desc,
    provider: document.getElementById('ef-provider').value.trim(),
    invoice:  document.getElementById('ef-invoice').value.trim(),
    amount:   parseFloat(document.getElementById('ef-amount').value)||null,
    created_by: session?.profile?.full_name||'admin',
  };
  if (type==='km' && ev.km) {
    const v2 = vehicles.find(x => x.id===vehicleId);
    if (v2 && (!v2.km_current || ev.km > v2.km_current)) {
      v2.km_current = ev.km;
      try { await sbFetch(`fleet_vehicles?id=eq.${vehicleId}`, { method:'PATCH', headers:{'Prefer':'return=minimal'}, body:JSON.stringify({km_current:ev.km}) }); }
      catch(e) { console.warn('km update:', e.message); }
    }
  }
  try {
    await sbFetch('fleet_events', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(ev) });
    events.push(ev);
    cacheLocally();
    closeModal('modal-event');
    journalFilter = 'all';
    toast('Événement enregistré ✓');
    const v = vehicles.find(x => x.id===vehicleId);
    if (v) renderVehicleDetail(v);
  } catch(e) { toast('Erreur: '+e.message,'err'); }
}

// ─── DRIVER ───
function openDriverModal(vehicleId) {
  document.getElementById('df-name').value = '';
  document.getElementById('df-date').value = todayISO();
  document.getElementById('df-reason').value = '';
  document.getElementById('modal-driver').dataset.vehicleId = vehicleId;
  openModal('modal-driver');
}

async function saveDriverChange() {
  const vehicleId = document.getElementById('modal-driver').dataset.vehicleId;
  const name   = document.getElementById('df-name').value.trim();
  const date   = document.getElementById('df-date').value;
  const reason = document.getElementById('df-reason').value.trim();
  if (!name) { toast('Nom du conducteur obligatoire','err'); return; }
  const ev = {
    id: uuid(),
    vehicle_id: vehicleId,
    date: date || todayISO(),
    type: 'conducteur',
    km: null,
    description: name,
    provider: reason,
    invoice: '',
    amount: null,
    created_by: session?.profile?.full_name||'admin',
  };
  try {
    await sbFetch('fleet_events', { method:'POST', headers:{'Prefer':'return=minimal'}, body:JSON.stringify(ev) });
    events.push(ev);
    cacheLocally();
    closeModal('modal-driver');
    toast('Conducteur mis à jour ✓');
    const v = vehicles.find(x => x.id===vehicleId);
    if (v) renderVehicleDetail(v);
  } catch(e) { toast('Erreur: '+e.message,'err'); }
}

// ─── MODALS ───
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('show'); });
});

// ─── TOAST ───
function toast(msg, type='ok') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type==='err'?'err':type==='warn'?'warn':''}`;
  el.innerHTML = `<span>${type==='err'?'✕':type==='warn'?'⚠':'✓'}</span>${msg}`;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(()=>el.remove(),250); }, 3000);
}
